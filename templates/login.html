<!DOCTYPE html>
<html>
<head>
    <title>Login - Stress Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #0f0f0f 50%);
        }
        .box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
        }
        .logo { text-align: center; font-size: 2.5em; margin-bottom: 8px; }
        h2 { text-align: center; color: #fff; font-size: 1.4em; margin-bottom: 4px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 28px; font-size: 0.9em; }
        label { font-size: 0.85em; color: #aaa; margin-bottom: 6px; display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 18px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            font-size: 0.95em;
            color: #fff;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #7c3aed; background: #2a2a2a; }
        input::placeholder { color: #555; }
        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .error {
            color: #f87171;
            font-size: 0.85em;
            text-align: center;
            margin-bottom: 12px;
            display: none;
            background: rgba(248,113,113,0.1);
            padding: 8px;
            border-radius: 6px;
        }
        .link { text-align: center; margin-top: 20px; font-size: 0.9em; color: #666; }
        .link a { color: #7c3aed; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <h2>Stress Monitor</h2>
    <p class="subtitle">Login to your account</p>
    <div class="error" id="errorMsg"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
    <div class="link">Don't have an account? <a href="/register">Register here</a></div>
</div>
<script>
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Please fill in all fields'); return; }
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.status === 'success') {
        window.location = '/';
    } else {
        showError(data.message);
    }
}
function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}
document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
