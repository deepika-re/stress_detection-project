<!DOCTYPE html>
<html>
<head>
    <title>Login - Stress Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; padding: 40px; border-radius: 12px; width: 380px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 8px; color: #333; }
        p.subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9em; }
        label { font-size: 0.85em; color: #555; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95em; }
        input:focus { outline: none; border-color: #4CAF50; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: red; font-size: 0.85em; text-align: center; margin-bottom: 10px; display: none; }
        .link { text-align: center; margin-top: 16px; font-size: 0.9em; color: #666; }
        .link a { color: #4CAF50; text-decoration: none; }
    </style>
</head>
<body>
<div class="box">
    <h2>🧠 Stress Monitor</h2>
    <p class="subtitle">Login to your account</p>
    <div class="error" id="errorMsg"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
    <div class="link">Don't have an account? <a href="/register">Register here</a></div>
</div>
<script>
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if (!email || !password) {
        showError('Please fill in all fields');
        return;
    }

    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.status === 'success') {
        window.location = '/';
    } else {
        showError(data.message);
    }
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
});
</script>
</body>
</html>
